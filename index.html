<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Giriş / Kayıt ekranı -->
  <div class="app" id="auth-view" hidden>
    <h1>📝 Yapılacaklar</h1>
    <p class="subtitle">Devam etmek için giriş yap veya kaydol</p>

    <form id="auth-form" class="auth-form">
      <input type="email" id="auth-email" placeholder="E-posta" autocomplete="email" required>
      <input type="password" id="auth-password" placeholder="Şifre (en az 6 karakter)" autocomplete="current-password" minlength="6" required>
      <div class="auth-buttons">
        <button type="submit" id="login-btn">Giriş Yap</button>
        <button type="button" id="signup-btn" class="secondary">Kaydol</button>
      </div>
      <a href="#" id="forgot-link" class="text-link">Şifremi unuttum</a>
      <p id="auth-message" class="auth-message"></p>
    </form>

    <div class="divider"><span>veya</span></div>

    <button type="button" id="google-btn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.5 0 10.4-2.1 14.1-5.5l-6.5-5.5c-2 1.5-4.7 2.5-7.6 2.5-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.5C39.9 35.7 44 30.4 44 24c0-1.3-.1-2.3-.4-3.5z"/>
      </svg>
      Google ile giriş yap
    </button>
  </div>

  <!-- Yeni şifre belirleme ekranı (şifre sıfırlama linkinden gelince) -->
  <div class="app" id="reset-view" hidden>
    <h1>🔑 Yeni Şifre</h1>
    <p class="subtitle">Hesabın için yeni bir şifre belirle</p>
    <form id="reset-form" class="auth-form">
      <input type="password" id="reset-password" placeholder="Yeni şifre (en az 6 karakter)" autocomplete="new-password" minlength="6" required>
      <div class="auth-buttons">
        <button type="submit">Şifreyi Güncelle</button>
      </div>
      <p id="reset-message" class="auth-message"></p>
    </form>
  </div>

  <!-- Uygulama ekranı -->
  <div class="app" id="app-view" hidden>
    <div class="topbar">
      <h1>📝 Yapılacaklar</h1>
      <div class="user-box">
        <span id="user-email"></span>
        <button id="logout-btn">Çıkış</button>
      </div>
    </div>

    <form id="todo-form" class="todo-form">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="completed">Tamamlanan</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear-completed">Tamamlananları temizle</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
